<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>


  <div class="logo-container">
    <img src="img/logo-blanco.png" alt="Bio Alimentar" class="logo" id="logo">
  </div>

<section class="hero">
  <h1>Crear Cuenta</h1>

<form onsubmit="registrar(event)">
    <input type="text" id="r_nombre" placeholder="Nombre" required><br><br>
    <input type="text" id="r_apellido" placeholder="Apellido" required><br><br>
    <input type="email" id="r_email"placeholder="Correo electrónico"><br><br>
    <input type="text" id="r_usuario"placeholder="Nombre de Ususario"><br><br>
    <input type="password" id="r_password" placeholder="Contraseña" required><br><br>

    <button>Registrarse</button>
  </form>

  <p id="msg"></p>

  <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
</section>

<script src="registro.js">
document.getElementById('registerForm').addEventListener('submit', async e => {
  e.preventDefault();
  const usuario = document.getElementById('usuario').value;
  const password = document.getElementById('password').value;
  const res = await fetch('..api', {
   method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ usuario, password })
  });
  const msg = document.getElementById('msg');
  if (res.ok) {
    msg.innerText = 'Registro exitoso ✅';
    setTimeout(() => {
      window.location.href = '/login.html';
    }, 1500);
  } else {
    msg.innerText = await res.text();
  }
});
</script>

</body>
</html>
